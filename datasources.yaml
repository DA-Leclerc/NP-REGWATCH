# =============================================================================
# Nord Paradigm Regwatch — Source Registry
# Repo: DA-Leclerc/NP-REGWATCH
# Last curated: 2026-04-25 by Dominic
#
# Curation discipline: every source must tie to a Brèche Pro vertical module,
# a Kind 2 / Kind 3 rule, or Signal editorial scope. Sources that don't earn
# their weekly check get dropped during quarterly review.
#
# Schema reference:
#   id                 — stable kebab-case identifier
#   url                — exact URL to fetch
#   category           — ordre | government | vendor-policy | privacy-regulator | news-commentary
#   vertical           — matches Brèche Pro vertical module ID, or 'all'
#   priority           — critical | high | medium | low
#   check_frequency    — weekly | biweekly | monthly
#   language           — fr | en | bilingual
#   auto_promote       — always | on-keyword-match | never
#   keyword_filter     — required when auto_promote: on-keyword-match
#   notes              — human notes about what matters on this page
# =============================================================================

